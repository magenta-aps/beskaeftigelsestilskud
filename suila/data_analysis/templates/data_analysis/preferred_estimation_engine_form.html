{% load static %}
{% load i18n %}
<link rel="stylesheet" href="{% static 'bootstrap-icons/font/bootstrap-icons.min.css' %}"/>
<button id="toggle_{{ field_name }}_form-{{ person_year.id }}" class="btn btn-link">
    <i class="bi bi-pencil-fill"></i>
</button>
<div id="{{ field_name }}_form-{{ person_year.id }}" class="d-none">
    <form method="post" action="{% url url_name pk=person_year.id %}">
        {% csrf_token %}
        <input type="hidden" name="person_year" value="{{ person_year.id }}"/>
        <input type="hidden" name="redirect_querystring" value="{{ request.META.QUERY_STRING }}">
        <div class="input-group mb-3">
            <select name="{{ field_name }}" class="form-select">
            {% for value, label in engine_choices %}
                <option value="{{ value }}" {% if value == person_year|get_attr:field_name %}selected{% endif %}>
                    {{ value }} ({{ label }})
                </option>
            {% endfor %}
            </select>
            <button type="submit" class="btn btn-primary">{% translate "Gem" %}</button>
        </div>
    </form>
</div>
